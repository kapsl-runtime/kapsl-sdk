[package]
name = "kapsl-pyo3"
version = "0.1.0"
edition = "2021"

[lib]
name = "kapsl_sdk"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"] }
numpy = "0.22"
kapsl-ipc = { path = "../kapsl-ipc" }
kapsl-engine-api = { path = "../kapsl-engine-api" }
kapsl-shm = { path = "../kapsl-shm" }
kapsl-transport = { path = "../kapsl-transport" }
libc = "0.2"
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
